apiVersion: kubeadm.k8s.io/v1beta3
kind: JoinConfiguration
nodeRegistration:
  criSocket: unix:///var/run/containerd/containerd.sock
discovery:
  bootstrapToken:
    apiServerEndpoint: "${CONTROL_PLANE_PRIVATE_IP}:6443"
    token: "PLACEHOLDER_TOKEN"
    caCertHashes:
      - "sha256:PLACEHOLDER_HASH"
